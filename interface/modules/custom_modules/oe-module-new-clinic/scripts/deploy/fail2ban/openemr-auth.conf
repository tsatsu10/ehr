# fail2ban filter for OpenEMR login failures (SEC-5 network layer).
# OpenEMR logs auth failures to the `log` table, not a flat file, so this
# filter reads the Apache error.log line emitted by AuthUtils on failure
# (error_log("<user>: <ip>. user password is expired") and siblings) plus the
# generic access-log 200s to login.php. Prefer the error.log signal.
#
# Install: copy to /etc/fail2ban/filter.d/openemr-auth.conf
[Definition]
failregex = ^.*\]\s.*: <HOST>\. (user not found|user not active|user password incorrect|user credentials not found|user exceeded maximum number of failed logins|IP address exceeded maximum number of failed logins).*$
ignoreregex =
