; New Clinic production PHP hardening (SEC-6). Merge into php.ini or drop in a
; conf.d/ include on the clinic box / VPS. NEVER show errors to the browser —
; on a DB outage a raw error can leak connection details into the page/JSON.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
; Keep the error log off the web root and rotate it (see logrotate-openemr.conf).
error_log = /var/log/openemr/php_error.log
expose_php = Off
; Session cookie hardening (also enforced by OpenEMR; belt-and-suspenders).
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Strict"
