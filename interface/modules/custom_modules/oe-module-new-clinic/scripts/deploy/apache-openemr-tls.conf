# OpenEMR Apache TLS vhost (SEC-7). PUBLIC-EXPOSURE variant (explicit opt-in).
# For the DEFAULT tunnel-only posture, bind Listen to the tunnel interface only
# (see the SEC-7 runbook) and you do not need the 80->443 public redirect.

<VirtualHost *:80>
    ServerName clinic.example.org
    # Force HTTPS.
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName clinic.example.org
    DocumentRoot /var/www/openemr

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/clinic.example.org/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/clinic.example.org/privkey.pem

    # TLS 1.2+ only, strong ciphers.
    SSLProtocol            -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder    on

    # HSTS — 1 year, include subdomains. Only enable once HTTPS is confirmed working.
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    <Directory /var/www/openemr>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
