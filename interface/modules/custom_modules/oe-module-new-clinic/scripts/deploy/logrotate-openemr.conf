# OpenEMR log rotation (SEC-6). Install: /etc/logrotate.d/openemr
# XAMPP/Apache error.log grows unbounded and can hold identifiers from error
# paths — rotate, compress, and cap retention.
/var/log/openemr/php_error.log
/var/log/apache2/error.log
/opt/lampp/logs/error_log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root adm
}
