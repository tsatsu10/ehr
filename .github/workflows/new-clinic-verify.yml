##
# New Clinic module — lightweight verification for mobile / PR safety net.
# Runs on module PHP or frontend island changes. Does not replace full Docker CI.
#
# Static PHP gate: syntax, constructor cycles, controller imports, stray artifacts.
# Bootstrap instantiation (--bootstrap) needs a live DB — run on desktop via:
#   composer verify:new-clinic

name: New Clinic Verify

on:
  push:
    branches:
      - main
      - master
      - rel-*
    paths:
      - 'interface/modules/custom_modules/oe-module-new-clinic/**'
      - 'frontend/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/new-clinic-verify.yml'
  pull_request:
    branches:
      - main
      - master
      - rel-*
    paths:
      - 'interface/modules/custom_modules/oe-module-new-clinic/**'
      - 'frontend/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/new-clinic-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  php-static-verify:
    name: PHP static verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: |
          {
            printf 'dir='
            composer config cache-files-dir
          } >> "$GITHUB_OUTPUT"

      - name: Composer cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.2-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: New Clinic static verify (no DB bootstrap)
        run: php interface/modules/custom_modules/oe-module-new-clinic/scripts/verify-module.php

      - name: Desktop bootstrap reminder
        run: |
          echo "::notice title=Desktop gate::Run 'composer verify:new-clinic' on a host with MySQL before merging backend-heavy changes."

  frontend-verify:
    name: Frontend check + build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Unit tests (New Clinic desks)
        working-directory: frontend
        run: npm test -- src/islands/front-desk src/islands/patient-registry src/islands/visit-board

      - name: Production build
        working-directory: frontend
        run: npm run build
